        function renderTrack() {
            polylines.forEach(p => map.removeLayer(p));
            polylines = [];
            if (activeFileIndex === -1) return;
            const file = loadedFiles[activeFileIndex];
            const pts = file.points;
            if (currentMode === 0) {
                polylines.push(L.polyline(pts.map(p => mapLatLng(p.lat, p.lon)), { color: '#007AFF', weight: 5, opacity: 0.7 }).addTo(map));
            } else {
                const values = currentMode === 1 ? pts.map(p => p.speed) : pts.map(p => p.ele);
                const min = Math.min(...values), max = Math.max(...values);
                for (let i = 1; i < pts.length; i++) {
                    const ratio = (values[i] - min) / (max - min || 1);
                    const hue = currentMode === 1 ? ratio * 120 : (1 - ratio) * 120;
                    polylines.push(L.polyline([mapLatLng(pts[i - 1].lat, pts[i - 1].lon), mapLatLng(pts[i].lat, pts[i].lon)], {
                        color: `hsl(${hue}, 100%, 45%)`, weight: 6, opacity: 0.8
                    }).addTo(map));
                }
            }
        }

        function addStatsMarkers() {
            statsMarkers.forEach(m => map.removeLayer(m));
            statsMarkers = [];
            if (activeFileIndex === -1) return;
            const { stats, points } = loadedFiles[activeFileIndex];
            const addMarker = (idx, label, val, unit, cls) => {
                if (idx === -1) return;
                const p = points[idx];
                const icon = L.divIcon({
                    className: '',
                    html: `<div class="comic-marker ${cls}"><div class="comic-bubble">${label}: ${val}${unit}</div><div class="comic-arrow"></div></div>`,
                    iconSize: [80, 40], iconAnchor: [40, 36]
                });
                statsMarkers.push(L.marker(mapLatLng(p.lat, p.lon), { icon, zIndexOffset: 600 }).addTo(map));
            };
            addMarker(stats.maxEleIdx, '最高', stats.maxEle.toFixed(0), 'm', 'm-max-ele');
            addMarker(stats.minEleIdx, '最低', stats.minEle.toFixed(0), 'm', 'm-min-ele');
            addMarker(stats.maxSpeedIdx, '最快', (stats.maxSpeed * 3.6).toFixed(1), 'km/h', 'm-max-speed');
        }

        function formatDurationMs(ms) {
            const sec = Math.floor(ms / 1000);
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0) return `${h} 小时 ${m} 分钟`;
            if (m > 0) return s > 0 ? `${m} 分钟 ${s} 秒` : `${m} 分钟`;
            return `${s} 秒`;
        }

        function formatStopTime(ts) {
            if (!ts) return '--';
            return new Date(ts).toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: false
            });
        }

        function stopTooltipHtml(stop, idx) {
            return `<div class="stop-tooltip-inner">
                <div class="stop-tooltip-title">停靠点 ${idx + 1}</div>
                <div class="stop-tooltip-row"><span>停留</span><b>${formatDurationMs(stop.durationMs)}</b></div>
                <div class="stop-tooltip-row"><span>开始</span><b>${formatStopTime(stop.startTime)}</b></div>
                <div class="stop-tooltip-row"><span>结束</span><b>${formatStopTime(stop.endTime)}</b></div>
            </div>`;
        }

        function clearMilestoneMarkers() {
            milestoneMarkers.forEach(m => map.removeLayer(m));
            milestoneMarkers = [];
        }

        let milestoneUpdateTimer = null;
        function scheduleMilestoneUpdate() {
            clearTimeout(milestoneUpdateTimer);
            milestoneUpdateTimer = setTimeout(addMilestoneMarkers, 80);
        }

        function kmPerPixelAtCenter(mapInstance) {
            const center = mapInstance.getCenter();
            const zoom = mapInstance.getZoom();
            const metersPerPixel = 40075016 * Math.cos(center.lat * Math.PI / 180) / Math.pow(2, zoom + 8);
            return metersPerPixel / 1000;
        }

        function estimateViewSpanKm(mapInstance) {
            const bounds = mapInstance.getBounds();
            const sw = bounds.getSouthWest();
            const ne = bounds.getNorthEast();
            const widthKm = haversineDistance(sw.lat, sw.lng, sw.lat, ne.lng) / 1000;
            const heightKm = haversineDistance(sw.lat, sw.lng, ne.lat, sw.lng) / 1000;
            return Math.max(widthKm, heightKm, 0.5);
        }

        function chooseMilestoneIntervalKm(mapInstance, totalDistanceM) {
            const totalKm = totalDistanceM / 1000;
            if (totalKm < 1) return null;

            const candidates = MILESTONE_INTERVALS_KM.filter(n => n <= totalKm);
            if (!candidates.length) return null;

            const kmPx = kmPerPixelAtCenter(mapInstance);
            const viewKm = estimateViewSpanKm(mapInstance);

            let best = candidates[candidates.length - 1];
            for (const n of candidates) {
                if (n / kmPx >= MILESTONE_MIN_PX) {
                    best = n;
                    break;
                }
            }

            while (best < candidates[candidates.length - 1] && viewKm / best > MILESTONE_MAX_IN_VIEW) {
                const idx = candidates.indexOf(best);
                best = candidates[Math.min(idx + 1, candidates.length - 1)];
            }

            while (best > candidates[0] && viewKm / best < MILESTONE_MIN_IN_VIEW) {
                const idx = candidates.indexOf(best);
                const finer = candidates[idx - 1];
                if (finer / kmPx >= MILESTONE_MIN_PX * 0.55) {
                    best = finer;
                } else {
                    break;
                }
            }

            return best;
        }

        function formatMilestoneLabel(km) {
            return `${km}km`;
        }

        function createMilestoneIcon(label) {
            return L.divIcon({
                className: 'milestone-marker-wrap',
                html: `<div class="milestone-marker"><div class="milestone-plate">${label}</div><div class="milestone-pole"></div></div>`,
                iconSize: [52, 44],
                iconAnchor: [26, 44]
            });
        }

        function addMilestoneMarkers() {
            clearMilestoneMarkers();
            if (activeFileIndex === -1) return;

            const file = loadedFiles[activeFileIndex];
            const intervalKm = chooseMilestoneIntervalKm(map, file.totalDistance);
            if (!intervalKm) return;

            const bounds = map.getBounds().pad(0.08);
            const totalKm = file.totalDistance / 1000;

            for (let km = intervalKm; km < totalKm; km += intervalKm) {
                const pt = interpolatePointAtDistance(file.points, file.cumulativeDistances, km * 1000);
                const latLng = mapLatLng(pt.lat, pt.lon);
                if (!bounds.contains(latLng)) continue;

                const marker = L.marker(latLng, {
                    icon: createMilestoneIcon(formatMilestoneLabel(km)),
                    zIndexOffset: 400,
                    interactive: false
                }).addTo(map);
                milestoneMarkers.push(marker);
            }
        }

        function closeAllStopTooltips() {
            stopMarkers.forEach(m => m.closeTooltip());
            pinnedStopMarker = null;
        }

        function addStopMarkers() {
            closeAllStopTooltips();
            stopMarkers.forEach(m => map.removeLayer(m));
            stopMarkers = [];
            if (activeFileIndex === -1) return;
            const stops = loadedFiles[activeFileIndex].stops || [];
            stops.forEach((stop, idx) => {
                const icon = L.divIcon({
                    className: 'stop-marker',
                    html: `<div class="stop-marker-dot">${idx + 1}</div>`,
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });
                const marker = L.marker(mapLatLng(stop.lat, stop.lon), { icon, zIndexOffset: 500 })
                    .bindTooltip(stopTooltipHtml(stop, idx), {
                        direction: 'top',
                        offset: [0, -16],
                        className: 'stop-tooltip',
                        opacity: 1
                    })
                    .addTo(map);

                marker.on('mouseover', function () {
                    this.openTooltip();
                });
                marker.on('mouseout', function () {
                    if (pinnedStopMarker !== this) this.closeTooltip();
                });
                marker.on('click', function (e) {
                    L.DomEvent.stopPropagation(e);
                    if (pinnedStopMarker && pinnedStopMarker !== this) pinnedStopMarker.closeTooltip();
                    pinnedStopMarker = this;
                    this.openTooltip();
                });

                stopMarkers.push(marker);
            });
        }

        function formatDisplacement(m) {
            if (m < 1000) {
                return m < 100 ? `${m.toFixed(1)} m` : `${Math.round(m)} m`;
            }
            return `${(m / 1000).toFixed(2)} km`;
        }

        function formatEleDelta(m) {
            if (Math.abs(m) < 0.05) return '0 m';
            const sign = m > 0 ? '+' : '';
            return `${sign}${m.toFixed(1)} m`;
        }

        function eleDeltaClass(m) {
            if (m > 0.05) return 'info-delta-up';
            if (m < -0.05) return 'info-delta-down';
            return '';
        }

        function formatGrade(eleDelta, routeDelta) {
            if (Math.abs(routeDelta) < 0.01) return '--';
            const grade = (eleDelta / routeDelta) * 100;
            if (Math.abs(grade) < 0.05) return '0%';
            const sign = grade > 0 ? '+' : '';
            return `${sign}${grade.toFixed(1)}%`;
        }

        function stopOverlapMs(stops, t0, t1) {
            if (!t0 || !t1) return 0;
            const a = Math.min(t0, t1), b = Math.max(t0, t1);
            if (b <= a) return 0;
            let overlap = 0;
            for (const stop of stops) {
                if (!stop.startTime || !stop.endTime) continue;
                const o0 = Math.max(a, stop.startTime);
                const o1 = Math.min(b, stop.endTime);
                if (o1 > o0) overlap += o1 - o0;
            }
            return overlap;
        }

        function buildPointDeltaHtml(prev, cur, stops) {
            const routeDelta = cur.dist - prev.dist;
            const eleDelta = cur.ele - prev.ele;
            const moved = Math.abs(routeDelta) > 0.01 || Math.abs(eleDelta) > 0.05;
            if (!moved) return '';

            const grade = formatGrade(eleDelta, routeDelta);
            const gradeClass = grade === '--' ? '' : eleDeltaClass(eleDelta);

            let timeRows = '';
            if (prev.time && cur.time) {
                const tStart = Math.min(prev.time, cur.time);
                const tEnd = Math.max(prev.time, cur.time);
                const totalMs = tEnd - tStart;
                const stopMs = stopOverlapMs(stops, tStart, tEnd);
                const travelMs = Math.max(0, totalMs - stopMs);
                const routeDist = Math.abs(routeDelta);
                let avgSpeedHtml = '';
                if (travelMs > 0 && routeDist > 0.01) {
                    const avgKmh = (routeDist / (travelMs / 1000)) * 3.6;
                    avgSpeedHtml = `
                <span class="info-delta-label">行驶均速:</span>
                <b title="行驶距离 ÷ 行驶用时">${avgKmh.toFixed(1)} <small>km/h</small></b>`;
                }
                timeRows = `
                <span class="info-delta-label">总用时:</span>
                <b title="上一点至当前点的经过时间">${formatDurationMs(totalMs)}</b>`;
                if (stopMs > 0) {
                    timeRows += `
                <span class="info-delta-label">行驶用时:</span>
                <b title="总用时减去区间内停靠停留">${formatDurationMs(travelMs)}</b>`;
                }
                timeRows += avgSpeedHtml;
            }

            return `<div class="info-delta">
                <span class="info-delta-label">行驶:</span>
                <b title="沿轨迹的累计距离变化">${formatDisplacement(Math.abs(routeDelta))}</b>
                <span class="info-delta-label">海拔差:</span>
                <b class="${eleDeltaClass(eleDelta)}">${formatEleDelta(eleDelta)}</b>
                <span class="info-delta-label">坡度:</span>
                <b class="${gradeClass}" title="海拔差 ÷ 行驶距离">${grade}</b>
                ${timeRows}
            </div>`;
        }

        function interpolatePointAtDistance(points, cumulativeDistances, targetDist) {
            let i = 1;
            while (i < cumulativeDistances.length && cumulativeDistances[i] < targetDist) i++;
            if (i >= points.length) i = points.length - 1;

            const p1 = points[i - 1], p2 = points[i];
            const d1 = cumulativeDistances[i - 1], d2 = cumulativeDistances[i];
            const r = (d2 - d1) > 0 ? (targetDist - d1) / (d2 - d1) : 0;

            return {
                lat: p1.lat + (p2.lat - p1.lat) * r,
                lon: p1.lon + (p2.lon - p1.lon) * r,
                ele: p1.ele + (p2.ele - p1.ele) * r,
                speed: p1.speed + (p2.speed - p1.speed) * r,
                time: p1.time + (p2.time - p1.time) * r,
                dist: targetDist
            };
        }

        function ensurePrevIndicatorMarker() {
            if (!prevIndicatorMarker) {
                prevIndicatorMarker = L.marker([0, 0], { icon: getABIndicatorIcon('A', '#FF9500'), zIndexOffset: 950 });
            }
            return prevIndicatorMarker;
        }

        function updatePrevIndicatorMarker() {
            if (!segmentHighlightEnabled) {
                hidePrevIndicatorMarker();
                return;
            }
            if (!isSegmentABActive() || activeFileIndex === -1) {
                hidePrevIndicatorMarker();
                return;
            }
            const file = loadedFiles[activeFileIndex];
            const prev = interpolatePointAtDistance(file.points, file.cumulativeDistances, chartSegmentRange.from);
            const marker = ensurePrevIndicatorMarker();
            marker.setIcon(getABIndicatorIcon('A', '#FF9500'));
            marker.setLatLng(mapLatLng(prev.lat, prev.lon));
            if (!map.hasLayer(marker)) marker.addTo(map);
        }

        function hidePrevIndicatorMarker() {
            if (prevIndicatorMarker && map.hasLayer(prevIndicatorMarker)) {
                map.removeLayer(prevIndicatorMarker);
            }
        }

        function updateByDistance(targetDist, opts = {}) {
            if (activeFileIndex === -1) return;
            const skipSegment = opts.skipSegment === true;
            const file = loadedFiles[activeFileIndex];
            const { points, cumulativeDistances, totalDistance } = file;
            targetDist = Math.max(0, Math.min(targetDist, totalDistance));
            currentDistanceValue = targetDist;

            const cur = interpolatePointAtDistance(points, cumulativeDistances, targetDist);

            let deltaHtml = '';
            if (!skipSegment && segmentHighlightEnabled && prevCurrentPoint) {
                deltaHtml = buildPointDeltaHtml(prevCurrentPoint, cur, file.stops || []);
                if (Math.abs(targetDist - prevCurrentPoint.dist) > 0.01) {
                    chartSegmentRange = { from: prevCurrentPoint.dist, to: targetDist };
                }
            } else {
                chartSegmentRange = null;
            }
            prevCurrentPoint = { lat: cur.lat, lon: cur.lon, ele: cur.ele, dist: targetDist, time: cur.time };

            indicatorMarker.setLatLng(mapLatLng(cur.lat, cur.lon));
            if (!map.hasLayer(indicatorMarker)) indicatorMarker.addTo(map);
            updatePointMarkerIcons();
            updatePrevIndicatorMarker();
            if (mapCenterLockEnabled) {
                centerMapOnCurrentPoint(false);
            }
            document.getElementById('progress-slider').value = (targetDist / totalDistance) * 1000;

            const overlay = document.getElementById('info-overlay');
            overlay.style.display = 'block';
            const latFull = cur.lat;
            const lonFull = cur.lon;
            const latDisplay = cur.lat.toFixed(2);
            const lonDisplay = cur.lon.toFixed(2);
            const timeStr = cur.time
                ? new Date(cur.time).toLocaleString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                })
                : '--';
            overlay.innerHTML = `
            <div style="font-weight:800; color:#007AFF; margin-bottom:8px; border-bottom:1px solid rgba(0,0,0,0.08); padding-bottom:4px; overflow:hidden; text-overflow:ellipsis;">${file.name}</div>
            <div class="info-grid">
                <span class="info-label">实时时间:</span><b>${timeStr}</b>
                <span class="info-label">当前速度:</span>
                <span class="info-stat-link" onclick="openStatsModal('speed')" title="查看各速度行驶里程分布">
                    <b>${(cur.speed * 3.6).toFixed(1)} <small>km/h</small></b>${STAT_CHART_ICON_SVG}
                </span>
                <span class="info-label">当前海拔:</span>
                <span class="info-stat-link" onclick="openStatsModal('elevation')" title="查看各海拔行驶里程分布">
                    <b>${cur.ele.toFixed(1)} <small>m</small></b>${STAT_CHART_ICON_SVG}
                </span>
                <span class="info-label">累计距离:</span><b>${(targetDist / 1000).toFixed(2)} <small>km</small></b>
                <span class="info-label">经纬度:</span>
                <span class="nav-coords" onclick="openNavSheet(${latFull}, ${lonFull})" title="导航到该地点">
                    <b>${latDisplay}, ${lonDisplay}</b>${NAV_ICON_SVG}
                </span>
            </div>
            ${deltaHtml}
        `;
            renderTrackChart();
        }

        function getNavCoords(crs) {
            return CoordTransform.fromWgs84(navLat, navLon, crs || navCoordSys);
        }

        function updateNavSheetDisplay() {
            const { lat, lon } = getNavCoords(navCoordSys);
            document.getElementById('nav-sheet-crs').innerHTML =
                `${NAV_CRS_LABELS[navCoordSys]} <span class="nav-sheet-crs-hint">点击切换坐标系</span>`;
            document.getElementById('nav-sheet-coords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        }

        function toggleNavCoordSys(e) {
            e.stopPropagation();
            const idx = NAV_CRS_ORDER.indexOf(navCoordSys);
            navCoordSys = NAV_CRS_ORDER[(idx + 1) % NAV_CRS_ORDER.length];
            updateNavSheetDisplay();
            showToast(`已切换为 ${NAV_CRS_LABELS[navCoordSys]}`);
        }

        function openNavSheet(lat, lon) {
            navLat = Number(lat);
            navLon = Number(lon);
            navCoordSys = 'gcj02';
            updateNavSheetDisplay();
            const overlay = document.getElementById('nav-sheet-overlay');
            const sheet = document.getElementById('nav-sheet');
            overlay.style.display = 'block';
            requestAnimationFrame(() => {
                overlay.classList.add('open');
                sheet.classList.add('open');
            });
        }

        function closeNavSheet() {
            const overlay = document.getElementById('nav-sheet-overlay');
            const sheet = document.getElementById('nav-sheet');
            overlay.classList.remove('open');
            sheet.classList.remove('open');
            setTimeout(() => {
                if (!sheet.classList.contains('open')) overlay.style.display = 'none';
            }, 350);
        }

        function pickHistConfig(min, max, steps) {
            let best = null;
            for (const step of steps) {
                const lo = Math.floor(min / step) * step;
                let hi = Math.ceil(max / step) * step;
                if (hi <= lo) hi = lo + step;
                const numBins = Math.round((hi - lo) / step);
                if (numBins >= 1 && numBins <= HIST_MAX_BINS) {
                    if (!best || numBins > best.numBins) {
                        best = { step, lo, hi, numBins };
                    }
                }
            }
            if (best) return best;
            const step = steps[steps.length - 1];
            const lo = Math.floor(min / step) * step;
            const numBins = HIST_MAX_BINS;
            const hi = lo + numBins * step;
            return { step, lo, hi, numBins };
        }

        function buildDistanceHistogram(values, cumulativeDistances, kind) {
            if (values.length < 2) return null;
            const min = Math.min(...values);
            const max = Math.max(...values);
            const steps = kind === 'speed' ? SPEED_HIST_STEPS : ELE_HIST_STEPS;
            const { step, lo, hi, numBins } = pickHistConfig(min, max, steps);
            const bins = new Array(numBins).fill(0);

            for (let i = 1; i < values.length; i++) {
                const dist = cumulativeDistances[i] - cumulativeDistances[i - 1];
                if (dist <= 0) continue;
                const val = (values[i - 1] + values[i]) / 2;
                let idx = Math.floor((val - lo) / step);
                if (idx >= numBins) idx = numBins - 1;
                if (idx < 0) idx = 0;
                bins[idx] += dist;
            }

            const labels = [];
            for (let b = 0; b < numBins; b++) {
                labels.push({ lo: lo + b * step, hi: lo + (b + 1) * step });
            }
            return { bins, labels, min: lo, max: hi, step, totalDist: cumulativeDistances[cumulativeDistances.length - 1] };
        }

        function computeSpeedHistogram(file) {
            const speeds = file.points.map(p => p.speed * 3.6);
            return buildDistanceHistogram(speeds, file.cumulativeDistances, 'speed');
        }

        function computeElevationHistogram(file) {
            const elevations = file.points.map(p => p.ele);
            return buildDistanceHistogram(elevations, file.cumulativeDistances, 'elevation');
        }

        function formatHistDistance(m) {
            if (m < 1000) return `${Math.round(m)} m`;
            return `${(m / 1000).toFixed(2)} km`;
        }

        function formatHistBinLabel(lo) {
            return `${Math.round(lo)}`;
        }

        function hideStatsHistTooltip() {
            const tooltip = document.getElementById('stats-hist-tooltip');
            if (!tooltip) return;
            tooltip.style.display = 'none';
            statsHistTooltipPinned = false;
            const modal = document.getElementById('stats-modal');
            const wrap = document.getElementById('stats-hist-wrap');
            if (modal && wrap && tooltip.parentElement === document.body) {
                modal.insertBefore(tooltip, wrap);
            }
        }

        function placeStatsHistTooltip(bar) {
            const canvas = document.getElementById('stats-hist-canvas');
            const tooltip = document.getElementById('stats-hist-tooltip');
            if (!statsHistMeta || !canvas || !tooltip) return;

            if (tooltip.parentElement !== document.body) {
                document.body.appendChild(tooltip);
            }

            const rect = canvas.getBoundingClientRect();
            const unit = statsHistMeta.type === 'speed' ? 'km/h' : 'm';
            const hiLabel = Math.round(bar.hi);
            tooltip.textContent = `${Math.round(bar.lo)}–${hiLabel} ${unit}：${formatHistDistance(bar.dist)}`;
            tooltip.style.position = 'fixed';
            tooltip.style.left = (rect.left + bar.x + bar.w / 2) + 'px';
            tooltip.style.top = (rect.top + bar.barTop) + 'px';
            tooltip.style.transform = rect.top + bar.barTop < 72
                ? 'translate(-50%, 8px)'
                : 'translate(-50%, calc(-100% - 8px))';
            tooltip.style.display = 'block';
        }

        function setupStatsHistInteraction() {
            const canvas = document.getElementById('stats-hist-canvas');

            function canvasPoint(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.clientX ?? e.changedTouches?.[0]?.clientX;
                const clientY = e.clientY ?? e.changedTouches?.[0]?.clientY;
                const scaleX = rect.width / (canvas.offsetWidth || rect.width || 1);
                const scaleY = rect.height / (canvas.offsetHeight || rect.height || 1);
                return {
                    cx: (clientX - rect.left) / (scaleX || 1),
                    cy: (clientY - rect.top) / (scaleY || 1)
                };
            }

            function findBar(cx, cy) {
                return statsHistHitAreas.find(b =>
                    cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h
                );
            }

            function showBarTooltip(bar, pin) {
                if (pin) statsHistTooltipPinned = true;
                placeStatsHistTooltip(bar);
            }

            canvas.addEventListener('mousemove', (e) => {
                if (statsHistTooltipPinned) return;
                const { cx, cy } = canvasPoint(e);
                const bar = findBar(cx, cy);
                if (bar) placeStatsHistTooltip(bar);
                else hideStatsHistTooltip();
            });

            canvas.addEventListener('mouseleave', () => {
                if (!statsHistTooltipPinned) hideStatsHistTooltip();
            });

            canvas.addEventListener('click', (e) => {
                e.stopPropagation();
                const { cx, cy } = canvasPoint(e);
                const bar = findBar(cx, cy);
                if (bar) showBarTooltip(bar, true);
                else hideStatsHistTooltip();
            });

            canvas.addEventListener('touchstart', (e) => {
                const { cx, cy } = canvasPoint(e);
                const bar = findBar(cx, cy);
                if (bar) showBarTooltip(bar, true);
                else hideStatsHistTooltip();
            }, { passive: true });
        }

        function renderStatsHistogram(hist, type) {
            hideStatsHistTooltip();
            const canvas = document.getElementById('stats-hist-canvas');
            const wrap = document.getElementById('stats-hist-wrap');
            const ctx = canvas.getContext('2d');
            const n = hist.labels.length;
            let yMaxM = 1;
            for (let i = 0; i < n; i++) {
                const d = hist.bins[i] || 0;
                if (d > yMaxM) yMaxM = d;
            }

            const barGap = 4;
            const chartW = wrap.clientWidth || 320;
            const chartH = 232;
            const dpr = window.devicePixelRatio || 1;

            canvas.width = Math.round(chartW * dpr);
            canvas.height = Math.round(chartH * dpr);
            canvas.style.width = chartW + 'px';
            canvas.style.height = chartH + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, chartW, chartH);

            ctx.font = '10px -apple-system, sans-serif';
            const yMaxLabel = formatHistDistance(yMaxM);
            const yAxisLabelW = Math.max(ctx.measureText(yMaxLabel).width, ctx.measureText('0').width);
            const pad = { l: Math.max(40, Math.ceil(yAxisLabelW) + 8), r: 12, t: 12, b: 42 };
            const plotW = chartW - pad.l - pad.r;
            const barW = Math.max(8, (plotW - barGap * Math.max(n - 1, 0)) / n);

            const plotH = chartH - pad.t - pad.b;
            const valMin = hist.min;
            const valMax = hist.max;
            const valRange = valMax - valMin || 1;
            const hitAreas = [];

            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pad.l, pad.t + plotH);
            ctx.lineTo(pad.l + plotW, pad.t + plotH);
            ctx.stroke();

            ctx.fillStyle = '#888';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            ctx.fillText(yMaxLabel, pad.l - 4, pad.t);
            ctx.fillText('0', pad.l - 4, pad.t + plotH);

            for (let i = 0; i < n; i++) {
                const binM = hist.bins[i] || 0;
                const x = pad.l + i * (barW + barGap);
                const h = (binM / yMaxM) * plotH;
                const y = pad.t + plotH - h;
                const mid = (hist.labels[i].lo + hist.labels[i].hi) / 2;
                const ratio = (mid - valMin) / valRange;
                const hue = type === 'speed' ? ratio * 120 : (1 - ratio) * 120;
                ctx.fillStyle = `hsl(${hue}, 78%, 48%)`;
                ctx.fillRect(x, y, barW, Math.max(h, binM > 0 ? 2 : 0));

                hitAreas.push({
                    x, y: pad.t, w: barW, h: plotH,
                    barTop: y,
                    dist: binM,
                    lo: hist.labels[i].lo,
                    hi: hist.labels[i].hi
                });

                ctx.fillStyle = '#555';
                ctx.font = n > 12 ? '8px -apple-system, sans-serif' : '9px -apple-system, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(formatHistBinLabel(hist.labels[i].lo), x + barW / 2, pad.t + plotH + 5);
            }

            statsHistHitAreas = hitAreas;
            statsHistMeta = { type };

            const unit = type === 'speed' ? 'km/h' : 'm';
            document.getElementById('stats-modal-foot').textContent =
                `纵轴：各区间累计行驶里程 · 横轴：${type === 'speed' ? '速度' : '海拔'}（${unit}，步进 ${hist.step}，从左到右递增） · 总计 ${formatHistDistance(hist.totalDist)}`;
        }

        function openStatsModal(type) {
            if (activeFileIndex === -1) return;
            const file = loadedFiles[activeFileIndex];
            const hist = type === 'speed' ? computeSpeedHistogram(file) : computeElevationHistogram(file);
            if (!hist) {
                showToast('数据不足，无法生成统计图');
                return;
            }

            document.getElementById('stats-modal-title').textContent =
                type === 'speed' ? '速度里程分布' : '海拔里程分布';

            const overlay = document.getElementById('stats-modal-overlay');
            const modal = document.getElementById('stats-modal');
            overlay.style.display = 'block';
            modal.style.display = 'flex';
            overlay.classList.add('open');
            modal.classList.add('open');
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    renderStatsHistogram(hist, type);
                });
            });
        }

        function closeStatsModal() {
            hideStatsHistTooltip();
            const overlay = document.getElementById('stats-modal-overlay');
            const modal = document.getElementById('stats-modal');
            overlay.classList.remove('open');
            modal.classList.remove('open');
            setTimeout(() => {
                if (!modal.classList.contains('open')) {
                    overlay.style.display = 'none';
                    modal.style.display = 'none';
                }
            }, 280);
        }

        function navAction(type) {
            const { lat, lon } = getNavCoords(navCoordSys);
            const lat6 = lat.toFixed(6);
            const lon6 = lon.toFixed(6);
            const name = encodeURIComponent('目的地');

            closeNavSheet();

            if (type === 'copy') {
                copyCoords(lat, lon);
                return;
            }

            let url;
            switch (type) {
                case 'amap':
                    url = `https://uri.amap.com/marker?position=${lon6},${lat6}&name=${name}`;
                    break;
                case 'baidu':
                    url = `https://api.map.baidu.com/marker?location=${lat6},${lon6}&title=${name}&content=${name}&output=html&src=GPXViewer`;
                    break;
                case 'tencent':
                    url = `https://apis.map.qq.com/uri/v1/marker?marker=coord:${lat6},${lon6};title:${name}`;
                    break;
                case 'google':
                    url = `https://www.google.com/maps/search/?api=1&query=${lat6},${lon6}`;
                    break;
                case 'system':
                    url = `geo:${lat6},${lon6}?q=${lat6},${lon6}(目的地)`;
                    break;
            }

            if (url) {
                if (type === 'system') {
                    window.location.href = url;
                } else {
                    const opened = window.open(url, '_blank');
                    if (!opened) window.location.href = url;
                }
            }
        }

        function copyCoords(lat, lon) {
            const text = `${Number(lat).toFixed(6)}, ${Number(lon).toFixed(6)}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('坐标已复制到剪贴板');
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('坐标已复制到剪贴板');
            });
        }

        function findNearestTrackPoint(clickedLatLng) {
            if (activeFileIndex === -1) return;
            const file = loadedFiles[activeFileIndex];
            const clickWgs = wgsFromMapClick(clickedLatLng.lat, clickedLatLng.lng);
            let minSqDist = Infinity, nearestIdx = 0;
            for (let i = 0; i < file.points.length; i++) {
                const p = file.points[i];
                const sqDist = Math.pow(clickWgs.lat - p.lat, 2) + Math.pow(clickWgs.lon - p.lon, 2);
                if (sqDist < minSqDist) { minSqDist = sqDist; nearestIdx = i; }
            }
            updateByDistance(file.cumulativeDistances[nearestIdx]);
            stopTrackPlay();
            exitMapCenterLock();
            invalidateMapViewBtnSequence();
        }

        function onMapUserViewInterrupt() {
            if (mapProgrammaticMove) return;
            exitMapCenterLock();
            invalidateMapViewBtnSequence();
        }

        function invalidateMapViewBtnSequence() {
            mapViewBtnPendingStep = 0;
            updateMapViewButtonUI();
        }

        function exitMapCenterLock() {
            if (!mapCenterLockEnabled) return;
            mapCenterLockEnabled = false;
            updateMapViewButtonUI();
        }

        function updateMapViewButtonUI() {
            const btn = document.getElementById('reset-view');
            if (!btn) return;
            btn.classList.toggle('map-center-lock', mapCenterLockEnabled);
            if (mapCenterLockEnabled) {
                btn.title = '连续点击：定位当前点 → 已锁定中心 → 复位全览';
            } else if (mapViewBtnPendingStep === 1) {
                btn.title = '再次点击：锁定当前点到地图中心';
            } else if (mapViewBtnPendingStep === 2) {
                btn.title = '再次点击：复位地图全览';
            } else {
                btn.title = '定位到当前点（连续点击可锁定中心、复位全览）';
            }
        }

        function centerMapOnCurrentPoint(animate = true) {
            if (activeFileIndex === -1) return;
            const ll = indicatorMarker.getLatLng();
            mapProgrammaticMove = true;
            map.panTo(ll, { animate: animate });
        }

        function fitMapToTrack() {
            if (activeFileIndex === -1) return;
            mapProgrammaticMove = true;
            map.fitBounds(
                L.latLngBounds(loadedFiles[activeFileIndex].points.map(p => mapLatLng(p.lat, p.lon))),
                { padding: [40, 40] }
            );
            scheduleMilestoneUpdate();
        }

        function resetMapViewFull() {
            exitMapCenterLock();
            invalidateMapViewBtnSequence();
            fitMapToTrack();
        }

        function handleMapViewButtonClick() {
            if (activeFileIndex === -1) return;

            const step = mapViewBtnPendingStep;
            if (step === 0) {
                centerMapOnCurrentPoint(true);
                mapViewBtnPendingStep = 1;
                updateMapViewButtonUI();
                showToast('已定位到当前点');
            } else if (step === 1) {
                mapCenterLockEnabled = true;
                centerMapOnCurrentPoint(false);
                mapViewBtnPendingStep = 2;
                updateMapViewButtonUI();
                showToast('当前点已锁定地图中心');
            } else {
                mapCenterLockEnabled = false;
                fitMapToTrack();
                mapViewBtnPendingStep = 0;
                updateMapViewButtonUI();
                showToast('已复位地图全览');
            }
        }

        function resetMapView() {
            resetMapViewFull();
        }

        function toggleMode() {
            currentMode = (currentMode + 1) % 3;
            showToast(["普通模式", "速度热力", "海拔热力"][currentMode]);
            renderTrack();
            renderTrackChart();
        }

        function moveByDistance(direction) {
            if (activeFileIndex === -1) return;
            if (direction < 0) stopTrackPlay();
            invalidateMapViewBtnSequence();
            updateByDistance(currentDistanceValue + (direction * currentStepValue));
            if (direction > 0 && trackPlaying && isAtTrackEnd()) {
                stopTrackPlay();
            }
        }

        function isAtTrackEnd() {
            if (activeFileIndex === -1) return true;
            return currentDistanceValue >= loadedFiles[activeFileIndex].totalDistance - 0.01;
        }

        function updatePlayButtonUI() {
            const btn = document.getElementById('track-play');
            if (!btn) return;
            btn.classList.toggle('playing', trackPlaying);
            btn.title = trackPlaying ? '暂停播放' : '播放轨迹';
            btn.innerHTML = trackPlaying
                ? `<svg class="track-play-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                        <rect x="6" y="5" width="4" height="14" rx="1"></rect>
                        <rect x="14" y="5" width="4" height="14" rx="1"></rect>
                   </svg>`
                : `<svg class="track-play-icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                        <polygon points="8,5 19,12 8,19"></polygon>
                   </svg>`;
        }

        function stopTrackPlay() {
            if (!trackPlaying && !playInterval && !playDelayTimer) return;
            trackPlaying = false;
            clearTimeout(playDelayTimer);
            clearInterval(playInterval);
            playDelayTimer = null;
            playInterval = null;
            updatePlayButtonUI();
        }

        function startTrackPlay() {
            if (activeFileIndex === -1 || isAtTrackEnd()) return;
            trackPlaying = true;
            updatePlayButtonUI();
            moveByDistance(1);
            if (!trackPlaying) return;
            playDelayTimer = setTimeout(() => {
                playDelayTimer = null;
                if (!trackPlaying) return;
                playInterval = setInterval(() => {
                    if (activeFileIndex === -1 || isAtTrackEnd()) {
                        stopTrackPlay();
                        return;
                    }
                    moveByDistance(1);
                }, PLAY_STEP_INTERVAL_MS);
            }, PLAY_HOLD_DELAY_MS);
        }

        function toggleTrackPlay() {
            if (activeFileIndex === -1) return;
            if (trackPlaying) stopTrackPlay();
            else startTrackPlay();
        }

        function setupHoldableButton(id, action) {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); action(); holdTimer = setTimeout(() => { holdInterval = setInterval(action, 80); }, 400); };
            const stop = () => { clearTimeout(holdTimer); clearInterval(holdInterval); };
            ['mousedown', 'touchstart'].forEach(ev => btn.addEventListener(ev, start));
            ['mouseup', 'mouseleave', 'touchend'].forEach(ev => btn.addEventListener(ev, stop));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => { t.style.display = 'none'; }, 1500);
        }
    </script>
